services:
  postgres:
    image: postgres:16-alpine
    container_name: zennify-postgres
    environment:
      POSTGRES_USER: zennify
      POSTGRES_PASSWORD: zennify
      POSTGRES_DB: zennify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zennify -d zennify"]
      interval: 5s
      timeout: 5s
      retries: 5
  nats:
    image: nats:latest
    container_name: zennify-nats
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nats-server -v"]
      interval: 5s
  redis:
    image: redis:latest
    container_name: zennify-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]

volumes:
  postgres_data:
