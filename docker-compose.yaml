services:
  postgres:
    image: postgres:16-alpine
    container_name: zennify-postgres
    environment:
      POSTGRES_USER: zennify
      POSTGRES_PASSWORD: zennify
      POSTGRES_DB: zennify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zennify -d zennify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
