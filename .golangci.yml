# https://golangci-lint.run/docs/configuration/file/
version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  default: standard

  exclusions:
    generated: strict
    paths:
      - gen
      - "^gen/"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/zennify/backend
  exclusions:
    paths:
      - gen
      - "^gen/"
